<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="ORION — Security Operations Center Cosmos">
  <defs>
    <radialGradient id="space" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0c1430"/>
      <stop offset="45%" stop-color="#070b1c"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <radialGradient id="neb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5b3a8c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5b3a8c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f6f7a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1f6f7a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7e0"/>
      <stop offset="35%" stop-color="#ffd27f"/>
      <stop offset="100%" stop-color="#ffd27f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planet" cx="38%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#7fd0e0"/>
      <stop offset="60%" stop-color="#2f6aa5"/>
      <stop offset="100%" stop-color="#10243a"/>
    </radialGradient>
    <linearGradient id="comet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#46c8ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#bfe9ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1280" height="340" fill="url(#space)"/>
  <ellipse cx="320" cy="120" rx="380" ry="240" fill="url(#neb)">
    <animate attributeName="opacity" values="0.5;0.85;0.5" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="980" cy="240" rx="420" ry="260" fill="url(#neb2)">
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <!-- étoiles scintillantes -->
  <g fill="#cfe0ff">
    <circle cx="120" cy="60" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="270" r="1.1"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="80" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.8s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="610" cy="40" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.9s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="760" cy="300" r="1.5"><animate attributeName="opacity" values="1;0.2;1" dur="3.3s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="900" cy="70" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite" begin="0.8s"/></circle>
    <circle cx="1050" cy="290" r="1.4"><animate attributeName="opacity" values="1;0.4;1" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="1180" cy="110" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="1.4s"/></circle>
    <circle cx="70" cy="200" r="1.1"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite" begin="0.6s"/></circle>
    <circle cx="1210" cy="220" r="1.2"><animate attributeName="opacity" values="1;0.3;1" dur="3.4s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle cx="520" cy="300" r="1.1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite" begin="1.1s"/></circle>
    <circle cx="350" cy="180" r="1.0"><animate attributeName="opacity" values="1;0.4;1" dur="3.2s" repeatCount="indefinite" begin="0.9s"/></circle>
  </g>

  <!-- étoile (soleil) + planète en orbite -->
  <g transform="translate(190,170)">
    <circle r="70" fill="url(#sun)" opacity="0.5"><animate attributeName="r" values="68;78;68" dur="6s" repeatCount="indefinite"/></circle>
    <circle r="26" fill="#fff2cf" filter="url(#glow)"/>
    <ellipse rx="150" ry="46" fill="none" stroke="#33507f" stroke-opacity="0.4" stroke-width="1"/>
    <circle r="9" fill="url(#planet)">
      <animateMotion dur="14s" repeatCount="indefinite" path="M150,0 A150,46 0 1,1 -150,0 A150,46 0 1,1 150,0"/>
    </circle>
  </g>

  <!-- comète qui traverse -->
  <g>
    <g opacity="0">
      <path d="M0,0 L-90,10 L-90,-10 Z" fill="url(#comet)"/>
      <circle r="5" fill="#eaf6ff" filter="url(#glow)"/>
      <animateTransform attributeName="transform" type="translate" values="-120,300; 1400,60" dur="6s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="6s" repeatCount="indefinite" begin="2s"/>
    </g>
  </g>

  <!-- titre -->
  <g transform="translate(640,158)" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
    <text x="0" y="0" font-size="74" font-weight="800" letter-spacing="14" fill="#ffffff" filter="url(#softglow)" opacity="0.6">✦ ORION</text>
    <text x="0" y="0" font-size="74" font-weight="800" letter-spacing="14" fill="#ffffff">✦ ORION
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="0" y="48" font-size="17" font-weight="500" letter-spacing="11" fill="#8ab4ff">SECURITY&#160;&#160;OPERATIONS&#160;&#160;CENTER</text>
    <text x="0" y="78" font-size="12" letter-spacing="4" fill="#7d88a6">YOUR NETWORK BECOMES A COSMOS · EVERY THREAT, A COMET</text>
  </g>

  <rect x="0" y="338" width="1280" height="2" fill="#8ab4ff" opacity="0.5"/>
</svg>
