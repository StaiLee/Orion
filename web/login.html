<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orion — Connexion</title>
  <style>
    :root { --accent:#8ab4ff; --medium:#3ad6a0; --critical:#ff3b46; --muted:#7d88a6; --border:rgba(120,150,220,0.18); }
    * { box-sizing: border-box; }
    html,body { margin:0; height:100%; font-family: ui-monospace,"SF Mono",Menlo,Consolas,monospace; }
    body { display:flex; align-items:center; justify-content:center;
      background: radial-gradient(ellipse at 50% 35%, #0c1430, #070b1c 45%, #04060d 100%); color:#d6def0; overflow:hidden; }
    .stars { position:fixed; inset:0; pointer-events:none; }
    .card { position:relative; width:380px; max-width:92vw; background:rgba(12,16,30,0.78); border:1px solid var(--border);
      border-radius:16px; padding:34px 30px; backdrop-filter:blur(12px); box-shadow:0 30px 90px rgba(0,0,0,0.6); }
    .logo { font-size:34px; font-weight:800; letter-spacing:10px; text-align:center; color:#fff; text-shadow:0 0 30px var(--accent); }
    .logo span { color:var(--accent); }
    .sub { text-align:center; font-size:10px; letter-spacing:5px; color:var(--muted); margin:8px 0 26px; }
    label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:14px 0 6px; }
    input { width:100%; background:#04060f; border:1px solid var(--border); border-radius:8px; color:#fff;
      font-family:inherit; font-size:14px; padding:11px 12px; outline:none; }
    input:focus { border-color:var(--accent); }
    button { width:100%; margin-top:22px; padding:12px; border-radius:8px; border:1px solid var(--accent);
      background:rgba(138,180,255,0.18); color:#fff; font-family:inherit; font-size:14px; letter-spacing:1px; cursor:pointer; }
    button:hover { background:rgba(138,180,255,0.3); }
    .err { color:var(--critical); font-size:12px; min-height:16px; margin-top:12px; text-align:center; }
    .demo { margin-top:20px; padding-top:16px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); text-align:center; line-height:1.7; }
    .demo b { color:var(--medium); }
  </style>
</head>
<body>
  <canvas class="stars" id="stars"></canvas>
  <form class="card" id="form">
    <div class="logo">✦&nbsp;<span>ORION</span></div>
    <div class="sub">SECURITY OPERATIONS CENTER</div>
    <label for="u">Identifiant</label>
    <input id="u" autocomplete="username" autofocus />
    <label for="p">Mot de passe</label>
    <input id="p" type="password" autocomplete="current-password" />
    <button type="submit">Se connecter</button>
    <div class="err" id="err"></div>
    <div class="demo">Démo — mot de passe <b>orion</b><br/>admin · analyste · observateur</div>
  </form>
  <script>
    // petit champ d'étoiles
    const c = document.getElementById('stars'), x = c.getContext('2d');
    function resize(){ c.width = innerWidth; c.height = innerHeight; }
    resize(); addEventListener('resize', resize);
    const st = Array.from({length:160}, () => ({ x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*1.3, a:Math.random() }));
    (function loop(){ x.clearRect(0,0,c.width,c.height); for(const s of st){ s.a += (Math.random()-0.5)*0.05; s.a=Math.max(0.1,Math.min(1,s.a));
      x.fillStyle=`rgba(180,200,255,${s.a})`; x.beginPath(); x.arc(s.x,s.y,s.r,0,7); x.fill(); } requestAnimationFrame(loop); })();

    const form = document.getElementById('form'), err = document.getElementById('err');
    form.addEventListener('submit', async (e) => {
      e.preventDefault(); err.textContent = '';
      const r = await fetch('/api/login', { method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value }) });
      if (r.ok) location.href = '/';
      else err.textContent = '✗ Identifiants invalides';
    });
  </script>
</body>
</html>
